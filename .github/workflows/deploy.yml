name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --legacy-peer-deps
      - run: npm run build
        env:
          VITE_MOCK_AUTH: "true"
          VITE_DATA_PROVIDER: "supabase"
          VITE_SUPABASE_URL: "https://dyipslnseakgobczdlln.supabase.co"
          VITE_SUPABASE_ANON_KEY: "sb_publishable_g4edG1wujpmcQXs7-bykCQ_2ayf2Ds2"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
